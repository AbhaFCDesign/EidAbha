<script>
const canvas = document.getElementById("cardCanvas");
const ctx = canvas.getContext("2d");

const img = new Image();
img.src = "RaCa.png";

/* 📍 مكان الاسم (مضبوط على "اكتب اسمك") */
const NAME_Y_RATIO = 0.80;

/* حجم الخط */
const MAX_FONT = 80;
const MIN_FONT = 40;

img.onload = () => {
  canvas.width = img.width;
  canvas.height = img.height;

  document.fonts.ready.then(() => {
    autoFromURL();
  });
};

function autoFromURL(){
  const params = new URLSearchParams(window.location.search);
  const name = params.get("name");
  if(name){
    document.getElementById("nameInput").value = name;
    draw(name);
  } else {
    draw("");
  }
}

function draw(name){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.drawImage(img,0,0);

  if(!name) return;

  ctx.textAlign="center";
  ctx.textBaseline="middle";

  /* 🔥 اللون أبيض */
  ctx.fillStyle="#ffffff";

  /* ظل خفيف عشان يوضح */
  ctx.shadowColor="rgba(0,0,0,.4)";
  ctx.shadowBlur=10;
  ctx.shadowOffsetY=3;

  let size = MAX_FONT;
  const maxWidth = canvas.width * 0.75;

  while(size >= MIN_FONT){
    ctx.font = `${size}px 'YearHandicrafts'`;
    if(ctx.measureText(name).width <= maxWidth) break;
    size -= 2;
  }

  ctx.fillText(name, canvas.width/2, canvas.height * NAME_Y_RATIO);

  ctx.shadowColor="transparent";
}

function generate(){
  const name=document.getElementById("nameInput").value.trim();
  if(!name){ alert("اكتب الاسم أولاً"); return; }
  draw(name);
}

function downloadImage(){
  const name=document.getElementById("nameInput").value.trim();
  if(!name){ alert("اكتب الاسم أولاً"); return; }
  draw(name);

  const a=document.createElement("a");
  a.download=`${name}-eid.png`;
  a.href=canvas.toDataURL("image/png");
  a.click();
}

function shareWhatsApp(){
  const name=document.getElementById("nameInput").value.trim();
  if(!name){ alert("اكتب الاسم أولاً"); return; }

  const url = `${location.origin}${location.pathname}?name=${encodeURIComponent(name)}`;
  const text = `عيدك مبارك 🎉\nشوف تهنئتك باسمك:\n${url}`;
  window.open(`https://wa.me/?text=${encodeURIComponent(text)}`,"_blank");
}
</script>
